name: cinematic_weather
description: Cinematic Weather Demo — clean architecture, Riverpod, Lottie animations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  http: ^1.2.1
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  video_player: ^2.8.6
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.0
  latlong2: ^0.9.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/sunny.json
    - assets/lottie/rainy.json
    - assets/lottie/cloudy.json
    - assets/lottie/snowy.json
    - assets/lottie/thunderstorm.json
    - assets/lottie/mist.json
